<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 240" font-family="Arial, sans-serif" font-size="11">
  <defs>
    <marker id="ma" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#333"/>
    </marker>
  </defs>

  <!-- Input features -->
  <rect x="15" y="30" width="50" height="26" rx="4" fill="#E8F0FE" stroke="#4A7DC6" stroke-width="1.5"/>
  <text x="40" y="48" text-anchor="middle" font-size="10" font-style="italic" fill="#333">F̂₁</text>

  <rect x="15" y="68" width="50" height="26" rx="4" fill="#E8F0FE" stroke="#4A7DC6" stroke-width="1.5"/>
  <text x="40" y="86" text-anchor="middle" font-size="10" font-style="italic" fill="#333">F̂₂</text>

  <rect x="15" y="108" width="50" height="22" rx="4" fill="#ECEFF1" stroke="#999" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="40" y="123" text-anchor="middle" font-size="10" fill="#999">⋮</text>

  <rect x="15" y="142" width="50" height="26" rx="4" fill="#E8F0FE" stroke="#4A7DC6" stroke-width="1.5"/>
  <text x="40" y="160" text-anchor="middle" font-size="10" font-style="italic" fill="#333">F̂ₙ</text>

  <!-- Lines to Sum -->
  <line x1="65" y1="43" x2="120" y2="90" stroke="#333" stroke-width="1" marker-end="url(#ma)"/>
  <line x1="65" y1="81" x2="120" y2="92" stroke="#333" stroke-width="1" marker-end="url(#ma)"/>
  <line x1="65" y1="155" x2="120" y2="102" stroke="#333" stroke-width="1" marker-end="url(#ma)"/>

  <!-- Sum node -->
  <circle cx="135" cy="96" r="16" fill="#FFF" stroke="#333" stroke-width="1.5"/>
  <text x="135" y="101" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Σ</text>

  <!-- GAP -->
  <line x1="151" y1="96" x2="183" y2="96" stroke="#333" stroke-width="1.2" marker-end="url(#ma)"/>
  <rect x="191" y="82" width="50" height="28" rx="4" fill="#FFF3E0" stroke="#E6910E" stroke-width="1.5"/>
  <text x="216" y="100" text-anchor="middle" font-size="10" fill="#333">GAP</text>

  <!-- MLP -->
  <line x1="241" y1="96" x2="273" y2="96" stroke="#333" stroke-width="1.2" marker-end="url(#ma)"/>
  <rect x="281" y="82" width="50" height="28" rx="4" fill="#E8F0FE" stroke="#4A7DC6" stroke-width="1.5"/>
  <text x="306" y="100" text-anchor="middle" font-size="10" fill="#333">MLP</text>

  <!-- Reshape + Softmax -->
  <line x1="331" y1="96" x2="363" y2="96" stroke="#333" stroke-width="1.2" marker-end="url(#ma)"/>
  <rect x="371" y="76" width="66" height="40" rx="4" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="404" y="93" text-anchor="middle" font-size="10" fill="#333">Reshape</text>
  <text x="404" y="108" text-anchor="middle" font-size="10" fill="#333">Softmax</text>

  <!-- α labels -->
  <line x1="437" y1="96" x2="475" y2="96" stroke="#333" stroke-width="1.2" marker-end="url(#ma)"/>
  <text x="456" y="88" text-anchor="middle" font-size="10" fill="#4CAF50" font-style="italic">α₁…αₙ</text>

  <!-- Multiply node ⊗ -->
  <circle cx="490" cy="96" r="16" fill="#FFF" stroke="#333" stroke-width="1.5"/>
  <text x="490" y="102" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">⊗</text>

  <!-- Feature bypass to multiply -->
  <path d="M65,43 Q85,43 85,22 Q85,8 280,8 Q475,8 490,76" stroke="#333" stroke-width="1" fill="none" stroke-dasharray="4,2" marker-end="url(#ma)"/>
  <text x="280" y="7" text-anchor="middle" font-size="9" font-style="italic" fill="#888">F̂₁…F̂ₙ</text>

  <!-- Sum after multiply -->
  <line x1="506" y1="96" x2="540" y2="96" stroke="#333" stroke-width="1.2" marker-end="url(#ma)"/>
  <circle cx="555" cy="96" r="16" fill="#FFF" stroke="#333" stroke-width="1.5"/>
  <text x="555" y="101" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Σ</text>

  <!-- Output -->
  <line x1="571" y1="96" x2="608" y2="96" stroke="#333" stroke-width="1.5" marker-end="url(#ma)"/>
  <rect x="616" y="82" width="46" height="28" rx="4" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="639" y="94" text-anchor="middle" font-size="10" font-style="italic" font-weight="bold" fill="#333">Y</text>
  <text x="639" y="106" text-anchor="middle" font-size="8" fill="#555">MFM</text>

  <!-- Caption -->
  <text x="340" y="225" text-anchor="middle" font-size="12" fill="#666">图 ? MFM结构示意图</text>
</svg>
